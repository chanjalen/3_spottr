{% extends 'gyms/base.html' %}

{% block title %}Spottr - Home{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Welcome to Spottr</h1>
</div>

<div class="home-hero">
    <div class="hero-glow"></div>
    <div class="hero-icon">💪</div>
    <p class="hero-text">Find gyms, track workouts, and connect with your fitness community.</p>
</div>

{% endblock %}

{% block extra_css %}
<style>
    .home-hero {
        text-align: center;
        padding: 48px 24px;
        background: var(--bg-card);
        border-radius: var(--radius-2xl);
        margin-bottom: 32px;
        border: 1px solid var(--border-default);
        position: relative;
        overflow: hidden;
    }

    .hero-glow {
        position: absolute;
        top: -50%;
        left: 50%;
        transform: translateX(-50%);
        width: 300px;
        height: 300px;
        background: radial-gradient(circle, rgba(124, 58, 237, 0.12) 0%, transparent 70%);
        pointer-events: none;
    }

    .hero-icon {
        font-size: 64px;
        margin-bottom: 16px;
        position: relative;
    }

    .hero-text {
        color: var(--text-secondary);
        font-size: 16px;
        max-width: 320px;
        margin: 0 auto;
        line-height: 1.6;
        position: relative;
    }

    .section-title {
        font-size: 20px;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 6px;
        letter-spacing: -0.3px;
    }

    .section-subtitle {
        font-size: 14px;
        color: var(--text-muted);
        margin-bottom: 20px;
    }

    .demo-grid {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .demo-card {
        display: flex;
        align-items: center;
        gap: 16px;
        background: var(--bg-card);
        border: 1px solid var(--border-default);
        border-radius: var(--radius-lg);
        padding: 20px;
        text-decoration: none;
        transition: all var(--duration) var(--ease-out);
        position: relative;
        overflow: hidden;
    }

    .demo-card::after {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: linear-gradient(180deg, var(--brand-purple), var(--brand-blue));
        opacity: 0;
        transition: opacity var(--duration) var(--ease-out);
    }

    .demo-card:hover {
        border-color: var(--border-hover);
        transform: translateX(4px);
        box-shadow: var(--shadow-md), var(--shadow-glow);
    }

    .demo-card:hover::after {
        opacity: 1;
    }

    .demo-card-icon {
        font-size: 26px;
        width: 50px;
        height: 50px;
        background: var(--bg-elevated);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: all var(--duration) var(--ease-out);
    }

    .demo-card:hover .demo-card-icon {
        border-color: var(--border-hover);
        box-shadow: var(--shadow-glow);
    }

    .demo-card-content {
        flex: 1;
        min-width: 0;
    }

    .demo-card-title {
        font-size: 15px;
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: 4px;
    }

    .demo-card-desc {
        font-size: 13px;
        color: var(--text-muted);
        line-height: 1.4;
    }

    .demo-card-arrow {
        font-size: 18px;
        color: var(--text-brand);
        transition: transform var(--duration) var(--ease-out);
        flex-shrink: 0;
    }

    .demo-card:hover .demo-card-arrow {
        transform: translateX(4px);
    }

    /* Staggered animation for demo cards */
    .demo-card {
        animation: fadeIn 0.4s var(--ease-out) both;
    }
    .demo-card:nth-child(1) { animation-delay: 0.05s; }
    .demo-card:nth-child(2) { animation-delay: 0.1s; }
    .demo-card:nth-child(3) { animation-delay: 0.15s; }
    .demo-card:nth-child(4) { animation-delay: 0.2s; }
</style>
{% endblock %}
