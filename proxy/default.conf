upstream django {
    server backend:8000;
}

server {
    listen 80;

    # Allow media uploads up to 50 MB (matches backend MAX_FILE_SIZE)
    client_max_body_size 50m;

    # HTTP — Django REST API and admin
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket — Django Channels (messaging)
    location /ws/ {
        proxy_pass http://django;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Keep WebSocket connections alive for up to 24 h of idle time.
        # Without this, NGINX's 60s default kills connections that haven't
        # exchanged data recently (e.g. both users are just reading, not typing).
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
