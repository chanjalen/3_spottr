upstream django {
    server backend:8000;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name api.spottrgym.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.spottrgym.app;

    ssl_certificate /etc/letsencrypt/live/api.spottrgym.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.spottrgym.app/privkey.pem;

    # Allow media uploads up to 50 MB (matches backend MAX_FILE_SIZE)
    client_max_body_size 50m;

    # HTTP — Django REST API and admin
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket — Django Channels (messaging)
    location /ws/ {
        proxy_pass http://django;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
