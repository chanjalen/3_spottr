services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

  proxy:
    build: ./proxy
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
